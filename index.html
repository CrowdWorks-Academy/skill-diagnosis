<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>クラウドワークス アカデミー 適性スキル診断</title>

<!-- Lucide Icons (CDN) -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  /* ===== Design Tokens =====
   * カラー設計方針(60/30/10 + 装飾色配分):
   *   ベース(60%): 白 / オフホワイト / 淡グレー
   *   メイン(30%): #E63264 — CTA・進捗バーなど「主要動作と進捗」のみに集中
   *   アクセント(10%): 青(情報補助) / 緑(肯定的・診断中) / 黄(注目バッジ)
   * テキスト用途の濃色版を別トークン化し、WCAG AA(4.5:1)を担保する。
   */
  :root {
    /* ブランドメイン(主要CTAと進捗のみに使用) */
    --color-main:        #E63264;  /* ピンク。進捗バー塗りなど非テキスト用途 */
    --color-main-deep:   #C8265A;  /* ピンク濃色版。白文字載せ・濃ピンク文字。
                                    白とのコントラスト ≈ 5.5:1 (AA合格) */

    /* 装飾(アクセント)カラー: 用途を明示分離 */
    --color-accent-1:      #33BAE8;  /* 情報・補助・進捗ハイライト用ライト青 */
    --color-accent-1-deep: #0E7BAD;  /* 同青の濃色版(テキスト用途、AA ≈ 4.7:1) */
    --color-accent-2:      #3CB388;  /* 肯定/診断中/成功フィードバック用ライト緑 */
    --color-accent-2-deep: #258060;  /* 同緑の濃色版(テキスト用途、AA ≈ 4.84:1) */
    --color-accent-3:      #FFDA44;  /* 注目・期待感バッジ用イエロー */
    --color-accent-3-deep: #B98800;  /* 同イエローの濃色版(必要時のテキスト/装飾) */

    /* ベースカラー */
    --color-bg:        #FFFFFF;       /* カード/フォアグラウンドのベース */
    --color-bg-soft:   #FAFAFA;       /* オフホワイト(ヘッダー帯/薄サーフェス) */
    --color-bg-mute:   #F5F5F5;       /* 淡グレー(プログレストラックなど) */

    --color-text:      #1A1A1A;
    --color-subtext:   #6B7280;       /* 白背景でコントラスト ≈ 4.83:1 (AA) */
    --color-border:    #E5E5E5;
    --color-overlay:   rgba(0, 0, 0, 0.6);

    --radius-card: 16px;
    --radius-button: 10px;
    --font-stack:
      -apple-system, BlinkMacSystemFont, "Helvetica Neue",
      "Hiragino Sans", "Hiragino Kaku Gothic ProN",
      "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
  }

  /* ===== Root containers ===== */
  .cwa-shindan-root,
  .cwa-shindan-root *,
  .cwa-shindan-root *::before,
  .cwa-shindan-root *::after {
    box-sizing: border-box;
  }
  .cwa-shindan-root {
    font-family: var(--font-stack);
    color: var(--color-text);
    -webkit-text-size-adjust: 100%;
  }

  /* ===== Overlay (shared) ===== */
  .cwa-overlay {
    position: fixed;
    inset: 0;
    background: var(--color-overlay);
    z-index: 99998;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: cwaFadeIn 0.25s ease-out both;
  }
  .cwa-overlay[hidden] { display: none !important; }

  @keyframes cwaFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes cwaPopIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes cwaSlideQuestion {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ===== Cards =====
   * 8倍数の余白システムを基本: 8 / 16 / 24 / 32 / 40 / 48 / 64 px
   * カード内 padding はモーダル外周として 24-32px(モバイル) / 32-40px(PC)を適用 */
  .cwa-card {
    position: relative;
    width: 90vw;
    max-width: 480px;
    max-height: calc(100vh - 32px);
    background: var(--color-bg);
    border-radius: var(--radius-card);
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
    padding: 32px 24px 24px;          /* モバイル: top 32 / 横 24 / 下 24 */
    animation: cwaPopIn 0.36s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    overflow-y: auto;
  }
  /* ブランドアクセント: モーダル上部に 3px の細いグラデーション帯
   *   メインカラー(ブランドピンク) → 装飾色1(青) で「可能性の広がり」を象徴
   *   全 4 画面で同じ装飾を共有し、シリーズとしての一貫性を演出
   *   非インタラクティブ・静的・WCAG非対象(装飾) */
  .cwa-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(
      90deg,
      var(--color-main-deep) 0%,
      var(--color-accent-1) 100%
    );
    border-top-left-radius: var(--radius-card);
    border-top-right-radius: var(--radius-card);
    pointer-events: none;
  }

  /* ===== Close button (×) ===== */
  .cwa-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 44px;
    height: 44px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--color-subtext);
    border-radius: 50%;
  }
  .cwa-close:focus { outline: none; }
  .cwa-close:focus-visible {
    outline: 3px solid var(--color-text);
    outline-offset: 2px;
  }
  .cwa-close svg { width: 22px; height: 22px; }

  /* ===== Banner ===== */
  /* 「無料」バッジ:
   *  - 装飾色3 (#FFDA44 イエロー) で「期待感・注目」を演出
   *  - 黒文字とのコントラスト 12.7:1 で AAA 合格
   *  - 通常フロー(in-flow)、親の text-align:center で自動中央寄せ */
  .cwa-banner__badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;                         /* 8倍数: アイコンとテキスト */
    margin: 8px 0;                    /* 8倍数: ロゴ→バッジを実効24pxに広げ独立感を出す。
                                         下側は タイトル margin-top 8px と合わせ実効16pxに維持 */
    padding: 6px 16px;                /* 8倍数: 横パディング */
    background: var(--color-accent-3);
    color: var(--color-text);
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.06em;
    border-radius: 999px;
    /* 二重シャドウで「ほんのり光る」上品なグロウ:
     *   1段目: 物理的な落ち影(視覚的接地感)
     *   2段目: 拡散グロウ(イエローの世界観をそっと広げる) */
    box-shadow:
      0 2px 6px rgba(255, 218, 68, 0.45),
      0 0 16px rgba(255, 218, 68, 0.28);
    max-width: 100%;
  }
  .cwa-banner__badge svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  .cwa-banner__inner { text-align: center; padding-top: 4px; }
  /* (旧)装飾アイコン3つはロゴ画像と冗長なため削除。
   *    ブランドアイデンティティはロゴ画像が一貫して担う。 */

  /* バナー見出し：
   *  - clamp() でスマホ〜PCまで段階的にサイズ調整(見切れ防止)
   *  - word-break:keep-all + overflow-wrap:anywhere で和文折返しを安全に
   *  - 「無料」訴求は上部の単一バッジ(.cwa-banner__badge)に集約済 */
  .cwa-banner__title {
    font-size: clamp(20px, 5.6vw, 26px);
    font-weight: 700;
    line-height: 1.4;                 /* 見出し用 1.3〜1.4 */
    letter-spacing: -0.01em;          /* ブランドトーン: 上品な引き締め */
    margin: 8px 0;                    /* 8倍数: バッジ→タイトル / タイトル→サブ */
    word-break: keep-all;
    overflow-wrap: anywhere;
  }
  .cwa-banner__subtitle {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-subtext);
    line-height: 1.6;                 /* 本文用 */
    margin: 0 0 24px;                 /* 8倍数: サブ→CTA はやや独立 */
  }
  .cwa-banner__cta {
    display: block;
    width: 100%;
    min-height: 56px;                              /* 8倍数 (44px超担保) */
    padding: 16px 24px;                            /* 8倍数 */
    /* 同系色内の自然なグラデで深みを出す(派手にしない) */
    background:
      linear-gradient(180deg, #D02B5F 0%, var(--color-main-deep) 100%);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-button);
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(200, 38, 90, 0.28);
    transition:
      transform 0.18s cubic-bezier(0.22, 0.61, 0.36, 1),
      box-shadow 0.18s ease,
      background-color 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cwa-banner__cta:active {
    background: #B11F4E;
    transform: scale(0.99);
    box-shadow: 0 2px 6px rgba(200, 38, 90, 0.28);
  }
  .cwa-banner__cta:focus { outline: none; }
  .cwa-banner__cta:focus-visible {
    outline: 3px solid var(--color-text);
    outline-offset: 2px;
  }
  .cwa-banner__note {
    margin-top: 16px;                              /* 8倍数: CTA → 補足 */
    font-size: 12px;
    line-height: 1.6;
    color: var(--color-subtext);
  }

  /* ===== Diagnosis modal ===== */
  .cwa-modal__header {
    display: flex;
    flex-direction: column;
    gap: 16px;                       /* 8倍数: ロゴ→プログレス */
    margin-bottom: 24px;             /* 8倍数: ヘッダー → 質問本体 */
    padding-right: 40px;             /* close button(44px)分の確保、8倍数 */
  }
  /* ロゴ(共通クラス):
   *  バナー / 診断モーダルヘッダー / 結果画面 の3箇所で同じスタイルを再利用
   *  - 中央寄せ(margin: 16px auto)。flex親でも auto マージンで中央に分配される
   *  - 高さ:スマホ max-height 32px / PC max-height 40px
   *  - 縦横比保持(object-fit: contain) */
  .cwa-logo {
    display: block;
    max-height: 32px;
    width: auto;
    margin: 16px auto;
    object-fit: contain;
    object-position: center center;
    user-select: none;
    -webkit-user-drag: none;
  }
  @media (min-width: 768px) {
    .cwa-logo {
      max-height: 40px;
    }
  }
  .cwa-progress {
    display: flex;
    flex-direction: column;
    gap: 8px;                        /* 8倍数: バー→ラベル */
  }
  .cwa-progress__bar {
    height: 6px;
    width: 100%;
    background: var(--color-bg-mute);  /* 淡グレー(ベース色) */
    border-radius: 999px;
    overflow: hidden;
  }
  .cwa-progress__fill {
    height: 100%;
    width: 0%;
    /* 同系色内グラデで奥行き(明 → 濃)。
     * 異なる色相は加えず、ピンク1色のトーン変化のみで上品さを演出 */
    background: linear-gradient(
      90deg,
      var(--color-main) 0%,
      var(--color-main-deep) 100%
    );
    border-radius: 999px;
    transition: width 0.35s ease-out;
  }
  .cwa-progress__label {
    font-size: 12px;
    color: var(--color-subtext);
    font-weight: 600;
    align-self: flex-end;
  }
  /* 「Q2 / 6」の現在の数字部分のみメインカラーで強調(ハイライト数値) */
  .cwa-progress__num {
    color: var(--color-main-deep);
    font-weight: 800;
    font-size: 14px;
    margin: 0 1px;
  }

  .cwa-modal__body { padding: 8px 0; }              /* 8倍数 */
  .cwa-question {
    font-size: 18px;
    line-height: 1.6;                                /* 本文用 1.6 */
    font-weight: 700;
    margin: 16px 0 24px;                             /* 8倍数: 上→ヘッダー間, 下→ボタン群 */
    min-height: 3.3em;
    animation: cwaSlideQuestion 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  /* tabindex="-1" 質問エレメントへのプログラマブル・フォーカスでは
   * フォーカスリングを表示しない(視覚的な「選択前は中立」を厳守) */
  .cwa-question:focus { outline: none; }
  .cwa-question:focus-visible { outline: none; }
  /* 「QUESTION X」ピル: 情報・補助系のため装飾色1(青)に変更
   * 薄ブルー背景 + 濃ブルー文字で AA合格 ≈ 4.71:1 */
  .cwa-question__num {
    display: inline-block;
    background: rgba(51, 186, 232, 0.12);
    color: var(--color-accent-1-deep);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 8px;             /* 8倍数: ピル → 質問文 */
    letter-spacing: 0.04em;
  }

  .cwa-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;                       /* 8倍数: YES → NO の関連性は密接 */
    margin-top: 16px;               /* 8倍数: 質問 → ボタン群 */
  }
  /* YES/NOボタン (ソシオメディア準拠: 美的最小主義・認知負荷の軽減)
   * 設計思想:
   *   ・ボタンらしさは「塗りの強さ」ではなく「形(サイズ・余白・角丸)+境界」で表現
   *   ・背景は彩度を大きく落とした淡いトーン → 主張しすぎず上品
   *   ・色相だけ違えて(YES=黄系 / NO=緑系)、視覚的重みは完全に同等
   *   ・文字色・フォントサイズ・パディング・ボーダー幅は両者で完全一致
   * コントラスト:
   *   YES = 淡クリーム #FFFAEB × ダーク文字 ≈ 18:1 (AAA)
   *   NO  = 淡ミント   #E8F5EE × ダーク文字 ≈ 17:1 (AAA) */
  .cwa-btn {
    width: 100%;
    min-height: 56px;                    /* 8倍数 (44px超担保) */
    padding: 8px 24px;                   /* 8倍数 */
    font-size: 17px;
    font-weight: 700;
    color: var(--color-text);
    border-radius: var(--radius-button);
    cursor: pointer;
    font-family: inherit;
    border-width: 2px;
    border-style: solid;
    transition:
      background-color 0.18s ease,
      border-color 0.18s ease,
      transform 0.18s cubic-bezier(0.22, 0.61, 0.36, 1),
      box-shadow 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cwa-btn--yes {
    background: #FFFAEB;                   /* 淡クリーム */
    border-color: #F5C518;                 /* 黄系の少し濃い色で輪郭定義 */
  }
  .cwa-btn--no {
    background: #E8F5EE;                   /* 淡ミント */
    border-color: var(--color-accent-2);   /* #3CB388 緑で輪郭定義 */
  }
  /* タップ時: 背景がわずかに一段濃くなる控えめな反応のみ */
  .cwa-btn--yes:active {
    background: #FCEFC4;                   /* クリームを一段濃く */
    transform: scale(0.99);
  }
  .cwa-btn--no:active {
    background: #D4ECDD;                   /* ミントを一段濃く */
    transform: scale(0.99);
  }
  /* :focus(マウス/タッチ含む) では outline を出さない。
   * :focus-visible(キーボードユーザー)時のみフォーカスリングを表示する。
   * ※ 各ブラウザで :focus-visible が未サポートな旧版でも、
   *    リング無しが「中立」のため UX デグレードにはならない。 */
  .cwa-btn:focus { outline: none; }
  .cwa-btn:focus-visible {
    outline: 3px solid var(--color-text);
    outline-offset: 2px;
  }

  /* 「前に戻る」: 接触面積 44x44px を確保 */
  .cwa-back {
    margin-top: 16px;                    /* 8倍数: ボタン群 → 戻るリンク */
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    background: none;
    border: none;
    color: var(--color-subtext);
    font-size: 14px;
    cursor: pointer;
    padding: 8px 16px;                   /* 8倍数 */
    text-decoration: underline;
    align-self: flex-start;
    font-family: inherit;
    border-radius: 8px;                  /* 8倍数 */
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.18s ease;
  }
  .cwa-back:focus { outline: none; }
  .cwa-back:active { background: var(--color-bg-mute); }
  .cwa-back:focus-visible {
    outline: 3px solid var(--color-text);
    outline-offset: 2px;
  }
  .cwa-back[hidden] { display: none; }

  /* ===== Loading screen ===== */
  /* 「診断中」は肯定的な進行状態 → 装飾色2(緑)を主軸に、青/黄を彩りで添える */
  .cwa-loading__inner {
    text-align: center;
    padding: 16px 8px;                   /* 8倍数 */
  }
  .cwa-loading__icons {
    display: flex;
    justify-content: center;
    gap: 16px;                           /* 8倍数 */
    margin-bottom: 24px;                 /* 8倍数: アイコン → タイトル */
    opacity: 0.95;
  }
  .cwa-loading__icons svg {
    width: 24px;
    height: 24px;
    animation: cwaBob 1.4s ease-in-out infinite;
  }
  .cwa-loading__icons svg:nth-child(1) {
    color: var(--color-accent-3-deep); /* sparkles: 注目=濃イエロー */
  }
  .cwa-loading__icons svg:nth-child(2) {
    color: var(--color-accent-1);      /* brain: 情報=青 */
    animation-delay: 0.15s;
  }
  .cwa-loading__icons svg:nth-child(3) {
    color: var(--color-accent-2);      /* bar-chart: 肯定=緑 */
    animation-delay: 0.3s;
  }
  .cwa-loading__icons svg:nth-child(4) {
    color: var(--color-accent-2-deep); /* check: 成功=濃緑 */
    animation-delay: 0.45s;
  }
  @keyframes cwaBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .cwa-loading__title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;                    /* 見出し用 */
    letter-spacing: -0.01em;             /* ブランドトーン: 引き締め */
    margin-bottom: 24px;                 /* 8倍数: タイトル → 進捗バー */
  }
  .cwa-loading__bar {
    position: relative;
    height: 10px;
    width: 100%;
    background: var(--color-bg-mute);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 16px;                 /* 8倍数: バー → メッセージ */
  }
  /* 進捗バー: 緑→青のグラデで「肯定的進行」を表現(ピンク非使用)
   * 上品な光沢シマー: 控えめな白半透明ハイライトを 2.4s でゆっくり横断 */
  .cwa-loading__fill {
    position: relative;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
                  var(--color-accent-2),
                  var(--color-accent-1));
    border-radius: 999px;
    overflow: hidden;
  }
  .cwa-loading__fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg,
                  rgba(255, 255, 255, 0)   0%,
                  rgba(255, 255, 255, 0.35) 50%,
                  rgba(255, 255, 255, 0)   100%);
    transform: translateX(-100%);
    animation: cwaShimmer 2.4s ease-in-out infinite;
  }
  @keyframes cwaShimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .cwa-loading__msg {
    font-size: 14px;
    line-height: 1.6;                    /* 本文用 */
    color: var(--color-subtext);
    min-height: 1.4em;
    transition: opacity 0.3s ease;
  }

  /* ===== Result screen ===== */
  .cwa-result__inner { text-align: center; }
  /* 結果ヘッドラインに 0.5s の上品な fade + 8px 上昇アニメーション
   * (ese-out で「ふわっと到達」、結果モーダル登場直後に1度だけ実行) */
  .cwa-result__headline {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;                    /* 見出し用 */
    letter-spacing: -0.01em;             /* ブランドトーン: 引き締め */
    margin: 8px 0;                       /* 8倍数 */
    animation: cwaResultRise 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  @keyframes cwaResultRise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* サブテキストもヘッドラインに少し遅れて(0.1s後)同じ動きで登場 */
  .cwa-result__sub {
    font-size: 15px;
    line-height: 1.6;                    /* 本文用 */
    font-weight: 500;
    color: var(--color-subtext);
    margin: 8px 0 24px;                  /* 8倍数: ヘッドライン直下 / シルエット手前 */
    animation: cwaResultRise 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s both;
  }
  /* シルエット: 期待感(黄)+情報(青)のグラデで「答えはこれから明かされる」演出
   * メインピンクは下のCTAに集中させ、ここでは登場させない */
  .cwa-silhouette {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 0 auto 24px;                 /* 8倍数: シルエット → CTA */
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(135deg,
        rgba(255, 218, 68, 0.18),
        rgba(51, 186, 232, 0.12));
    border-radius: 50%;
    /* シルエットは僅かに遅れて(0.2s後)登場 */
    animation: cwaResultRise 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) 0.2s both;
  }
  /* 職種を示すアイコンは深い青で「情報・補助」のトーンに */
  .cwa-silhouette svg {
    width: 88px;
    height: 88px;
    color: var(--color-accent-1-deep);
    opacity: 0.45;
    filter: blur(0.4px);
  }
  /* 「？」マークは濃いイエローで「期待感・問いかけ」を表現 */
  .cwa-silhouette__q {
    position: absolute;
    font-weight: 800;
    color: var(--color-accent-3-deep);
    opacity: 0.85;
    font-size: 28px;
    user-select: none;
  }
  .cwa-silhouette__q--1 { top: 12px; left: 18px; transform: rotate(-12deg); }
  .cwa-silhouette__q--2 { bottom: 16px; right: 14px; font-size: 22px; transform: rotate(8deg); }
  .cwa-silhouette__q--3 { top: 22px; right: 26px; font-size: 18px; transform: rotate(15deg); opacity: 0.4; }

  .cwa-result__cta {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 56px;                    /* 8倍数 (44px超担保) */
    padding: 16px 24px;                  /* 8倍数 */
    /* バナーCTAと同じ自然な縦グラデで一貫性を維持 */
    background:
      linear-gradient(180deg, #D02B5F 0%, var(--color-main-deep) 100%);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-button);
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 12px rgba(200, 38, 90, 0.28);
    transition:
      transform 0.18s cubic-bezier(0.22, 0.61, 0.36, 1),
      box-shadow 0.18s ease,
      background-color 0.12s ease;
    -webkit-tap-highlight-color: transparent;
    /* CTAも遅れて登場(0.3s後) — 視線の流れに沿う */
    animation: cwaResultRise 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s both;
  }
  .cwa-result__cta:active {
    background: #B11F4E;
    transform: scale(0.99);
    box-shadow: 0 2px 6px rgba(200, 38, 90, 0.28);
  }
  .cwa-result__cta:focus { outline: none; }
  .cwa-result__cta:focus-visible {
    outline: 3px solid var(--color-text);
    outline-offset: 2px;
  }
  .cwa-result__note {
    margin-top: 16px;                    /* 8倍数: CTA → 補足 */
    font-size: 12px;
    line-height: 1.6;
    color: var(--color-subtext);
  }

  /* ===== Responsive (PC) ===== */
  @media (min-width: 768px) {
    .cwa-card {
      width: 480px;
      padding: 40px 32px 32px;     /* PC: top 40 / 横 32 / 下 32 (8倍数) */
    }
    /* バナー見出しは clamp() で連続的にスケーリング済みのためここでは上書きしない */
    .cwa-question { font-size: 20px; }

    /* PC のみのマイクロインタラクション:
     *   ホバー時に「1px 浮く + 影が広がる」上品な反応(タッチ環境では発火しない)
     *   :active 時の押し込みフィードバックは元のまま維持 */
    @media (hover: hover) {
      .cwa-banner__cta:hover,
      .cwa-result__cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(200, 38, 90, 0.32);
      }
      .cwa-btn--yes:hover { background: #FCEFC4; }
      .cwa-btn--no:hover  { background: #D4ECDD; }
      .cwa-back:hover     { background: var(--color-bg-mute); }
    }
  }

  /* ===== Reduced motion ===== */
  @media (prefers-reduced-motion: reduce) {
    .cwa-overlay, .cwa-card, .cwa-question,
    .cwa-loading__icons svg {
      animation: none !important;
    }
    .cwa-progress__fill { transition: none !important; }
  }
</style>
</head>

<script>
(function () {
  'use strict';

  /* ============================================================
   * CONFIG: 文言・URL・スコアリングルールを集約。
   *   調整時はここだけ触ればOK。
   * ============================================================ */
  const CONFIG = {
    BANNER_DELAY_MS: 10000,
    BANNER_REHIDE_DAYS: 7,
    LOADING_DURATION_MS: 5000,
    QUESTION_TRANSITION_MS: 350,

    LS_KEY_CLOSED_AT: 'cwa_shindan_closed_at',
    LS_KEY_COMPLETED: 'cwa_shindan_completed',

    QUESTIONS: [
      '本を読むことに苦手意識はありますか？',
      '料理をするときレシピをしっかり見る方だと思いますか？',
      '旅行に行くなら事前に細かく予定や持ち物を計画する方ですか？',
      'スマホに新しいアプリを入れるのは好きですか？',
      'プレゼントを選ぶとき中身だけでなくラッピングにもこだわる方ですか？',
      '大人数で遊ぶより少人数の方が好きですか？'
    ],

    LOADING_MESSAGES: [
      { until: 2000, text: '回答を分析中...' },
      { until: 4000, text: 'あなたの適性をスコアリング中...' },
      { until: 5000, text: '結果を生成中...' }
    ],

    /* 結果職種定義(ID, 表示名, Lucideアイコン, LINE URL) */
    JOBS: {
      video:     {
        label: '動画編集',
        icon: 'film',
        url: 'https://s.lmes.jp/landing-qr/2005011340-4XwWXD8o?uLand=6vcMfT'
      },
      webdesign: {
        label: 'Webデザイン',
        icon: 'palette',
        url: 'https://s.lmes.jp/landing-qr/2005011340-4XwWXD8o?uLand=wJcZg3'
      },
      secretary: {
        label: 'オンライン秘書',
        icon: 'briefcase',
        url: 'https://s.lmes.jp/landing-qr/2005011340-4XwWXD8o?uLand=RSRF2P'
      },
      sns: {
        label: 'SNS運用',
        icon: 'megaphone',
        url: 'https://s.lmes.jp/landing-qr/2005011340-4XwWXD8o?uLand=tO33ay'
      },
      writing:   {
        label: 'Webライティング',
        icon: 'pen-tool',
        url: 'https://s.lmes.jp/landing-qr/2005011340-4XwWXD8o?uLand=CtdNLu'
      },
      website:   {
        label: 'Webサイト制作',
        icon: 'code-2',
        url: 'https://s.lmes.jp/landing-qr/2005011340-4XwWXD8o?uLand=vOvKJ3'
      }
    },

    /* 同点時の優先順位(高い方を採用) */
    TIE_BREAK_ORDER:
      ['video', 'webdesign', 'secretary', 'sns', 'writing', 'website'],

    /* ベーススコア(出現比率調整のため。仕様±1で微調整済) */
    BASE_SCORES: {
      video: 3, webdesign: 2, secretary: 0,
      sns: 0,   writing: 1,   website: 1
    },

    /* 質問ごとの加点表(YES/NO別)
     * 64パターンシミュレーションの結果、目標比率(動画50%/WD20%/秘書10%/
     * SNS10%/ライ5%/制作5%)に概ね一致するよう±1で調整済。
     * 質問の意味と職種特性の自然な紐付けは保持(例:Q5=ラッピング→Webデザイン)。
     */
    SCORING_RULES: [
      // Q1: 本を読むことに苦手意識はありますか？
      { yes: { video: 2, sns: 1 },
        no:  { writing: 3, secretary: 1, website: 1 } },
      // Q2: 料理をするときレシピをしっかり見る方？
      { yes: { secretary: 2, website: 2 },
        no:  { video: 1, sns: 1 } },
      // Q3: 旅行は事前に細かく計画する方？
      // (調整: secretary 2->1, webdesign 1->2 / 計画性=Webデザインの設計力にも紐付け)
      { yes: { secretary: 1, website: 1, webdesign: 2 },
        no:  { video: 2, sns: 1 } },
      // Q4: スマホに新しいアプリを入れるのは好き？
      { yes: { sns: 3, video: 1, website: 1 },
        no:  { secretary: 2, writing: 1 } },
      // Q5: プレゼントのラッピングにもこだわる？
      // (調整: video +1 を削除 / ラッピング志向は Webデザイン に集中)
      { yes: { webdesign: 3 },
        no:  { secretary: 1, writing: 1, website: 1 } },
      // Q6: 大人数より少人数の方が好き？
      { yes: { video: 1, writing: 1, website: 1, secretary: 1 },
        no:  { sns: 3, webdesign: 1 } }
    ]
  };

  /* ============================================================
   * Pure scoring function (testable)
   *   answers: boolean[6]  true=YES / false=NO
   *   return : ジョブID
   * ============================================================ */
  function decideResult(answers) {
    if (!Array.isArray(answers) || answers.length !== 6) {
      throw new Error('answers must be an array of length 6');
    }
    const score = Object.assign({}, CONFIG.BASE_SCORES);
    for (let i = 0; i < 6; i++) {
      const rule = CONFIG.SCORING_RULES[i];
      const add = answers[i] ? rule.yes : rule.no;
      for (const k in add) {
        score[k] = (score[k] || 0) + add[k];
      }
    }
    let bestJob = CONFIG.TIE_BREAK_ORDER[0];
    let bestScore = -Infinity;
    for (const jobId of CONFIG.TIE_BREAK_ORDER) {
      if (score[jobId] > bestScore) {
        bestScore = score[jobId];
        bestJob = jobId;
      }
    }
    return bestJob;
  }
  // 検証用にwindowへ公開(simulation.htmlからは使わないが手動チェック用)
  window.__cwaDecideResult = decideResult;

  /* ============================================================
   * GA4 helper (gtag.jsが無い環境でも安全に動作)
   * ============================================================ */
  function trackEvent(eventName, params) {
    params = params || {};
    try {
      if (typeof window.gtag === 'function') {
        window.gtag('event', eventName, params);
      }
    } catch (e) { /* ignore */ }
    // 開発時の確認用
    if (window.console && console.log) {
      console.log('[GA4]', eventName, params);
    }
  }

  /* ============================================================
   * localStorage helpers (safe wrapping)
   * ============================================================ */
  function lsGet(key) {
    try { return window.localStorage.getItem(key); }
    catch (e) { return null; }
  }
  function lsSet(key, value) {
    try { window.localStorage.setItem(key, String(value)); }
    catch (e) { /* private mode等で失敗しても無視 */ }
  }

  function shouldShowBanner() {
    if (lsGet(CONFIG.LS_KEY_COMPLETED) === 'true') return false;
    const closedAt = parseInt(lsGet(CONFIG.LS_KEY_CLOSED_AT) || '0', 10);
    if (!closedAt) return true;
    const elapsedMs = Date.now() - closedAt;
    const rehideMs = CONFIG.BANNER_REHIDE_DAYS * 24 * 60 * 60 * 1000;
    return elapsedMs >= rehideMs;
  }

  /* ============================================================
   * Focus trap (簡易版)
   * ============================================================ */
  let activeTrap = null;
  const FOCUSABLE_SEL = [
    'a[href]', 'button:not([disabled])', 'input:not([disabled])',
    'textarea:not([disabled])', 'select:not([disabled])',
    '[tabindex]:not([tabindex="-1"])'
  ].join(',');

  function trapFocus(container) {
    releaseTrap();
    const handler = function (e) {
      if (e.key !== 'Tab') return;
      const focusables = container.querySelectorAll(FOCUSABLE_SEL);
      if (!focusables.length) return;
      const visible = Array.from(focusables).filter(function (el) {
        return !el.hasAttribute('hidden') && el.offsetParent !== null;
      });
      if (!visible.length) return;
      const first = visible[0];
      const last  = visible[visible.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        last.focus(); e.preventDefault();
      } else if (!e.shiftKey && document.activeElement === last) {
        first.focus(); e.preventDefault();
      }
    };
    document.addEventListener('keydown', handler);
    activeTrap = { container: container, handler: handler };
  }
  function releaseTrap() {
    if (activeTrap) {
      document.removeEventListener('keydown', activeTrap.handler);
      activeTrap = null;
    }
  }

  /* ============================================================
   * Body scroll lock
   * ============================================================ */
  let bodyScrollLockedCount = 0;
  let savedBodyOverflow = '';
  function lockBodyScroll() {
    if (bodyScrollLockedCount === 0) {
      savedBodyOverflow = document.body.style.overflow;
      document.body.style.overflow = 'hidden';
    }
    bodyScrollLockedCount++;
  }
  function unlockBodyScroll() {
    bodyScrollLockedCount = Math.max(0, bodyScrollLockedCount - 1);
    if (bodyScrollLockedCount === 0) {
      document.body.style.overflow = savedBodyOverflow;
    }
  }

  /* ============================================================
   * Lucide rendering (CDNが遅延読み込みでも安全に再描画)
   * ============================================================ */
  function renderIcons() {
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      try { window.lucide.createIcons(); } catch (e) { /* ignore */ }
    }
  }

  /* ============================================================
   * State
   * ============================================================ */
  const state = {
    currentQ: 0,
    answers: [], // boolean[]
    transitioning: false
  };

  /* ============================================================
   * DOM
   * ============================================================ */
  const $bannerOverlay   = document.getElementById('cwa-banner-overlay');
  const $bannerStart     = document.getElementById('cwa-banner-start');
  const $bannerClose     = document.getElementById('cwa-banner-close');

  const $modalOverlay    = document.getElementById('cwa-modal-overlay');
  const $modalClose      = document.getElementById('cwa-modal-close');
  const $progressFill    = document.getElementById('cwa-progress-fill');
  const $progressLabel   = document.getElementById('cwa-progress-label');
  const $questionText    = document.getElementById('cwa-question-text');
  const $questionNum     = document.getElementById('cwa-question-num');
  const $btnYes          = document.getElementById('cwa-btn-yes');
  const $btnNo           = document.getElementById('cwa-btn-no');
  const $backBtn         = document.getElementById('cwa-back-btn');

  const $loadingOverlay  = document.getElementById('cwa-loading-overlay');
  const $loadingFill     = document.getElementById('cwa-loading-fill');
  const $loadingMsg      = document.getElementById('cwa-loading-msg');

  const $resultOverlay   = document.getElementById('cwa-result-overlay');
  const $resultClose     = document.getElementById('cwa-result-close');
  const $resultIcon      = document.getElementById('cwa-result-icon');
  const $resultCta       = document.getElementById('cwa-result-cta');

  /* ============================================================
   * Banner
   * ============================================================ */
  function showBanner() {
    if (!shouldShowBanner()) return;
    $bannerOverlay.hidden = false;
    lockBodyScroll();
    trapFocus($bannerOverlay);
    setTimeout(function () {
      $bannerStart.focus();
    }, 50);
    renderIcons();
    trackEvent('shindan_banner_shown');
  }
  function hideBanner(closedByUser) {
    if ($bannerOverlay.hidden) return;
    $bannerOverlay.hidden = true;
    unlockBodyScroll();
    releaseTrap();
    if (closedByUser) {
      lsSet(CONFIG.LS_KEY_CLOSED_AT, Date.now());
      trackEvent('shindan_banner_closed');
    }
  }

  $bannerStart.addEventListener('click', function () {
    trackEvent('shindan_banner_clicked');
    hideBanner(false);
    startDiagnosis();
  });
  $bannerClose.addEventListener('click', function () {
    hideBanner(true);
  });

  /* ============================================================
   * Diagnosis modal
   * ============================================================ */
  function startDiagnosis() {
    state.currentQ = 0;
    state.answers = [];
    state.transitioning = false;
    $modalOverlay.hidden = false;
    lockBodyScroll();
    trapFocus($modalOverlay);
    renderIcons();
    renderQuestion();
  }

  function renderQuestion() {
    const idx = state.currentQ;
    const total = CONFIG.QUESTIONS.length;

    $questionNum.textContent = 'QUESTION ' + (idx + 1);
    $questionText.textContent = CONFIG.QUESTIONS[idx];

    // 新しい質問のスライドインアニメーション
    const questionEl = document.getElementById('cwa-modal-title');
    questionEl.style.animation = 'none';
    void questionEl.offsetWidth; // reflowで再生
    questionEl.style.animation = '';

    // プログレス: 「現在表示中の質問」基準で塗る(Q1=1/6, Q6=6/6)
    const pct = ((idx + 1) / total) * 100;
    $progressFill.style.width = pct + '%';
    // 数字部分を span で囲み、CSSでメインカラー強調する
    $progressLabel.innerHTML =
      'Q<span class="cwa-progress__num">' + (idx + 1) + '</span> / ' + total;

    $backBtn.hidden = (idx === 0);

    /* フォーカス制御:
     *  - YES/NOボタンには絶対にフォーカスさせない(初期状態は中立)
     *  - 既にどこかにフォーカスが残っていたら blur() で解除
     *  - tabindex="-1" を持つ「質問テキスト」要素にプログラマブル・フォーカス
     *    → スクリーンリーダーは質問内容を読み上げ可能
     *    → :focus-visible は反応しない(プログラマブルフォーカスのため)
     *      = フォーカスリングは表示されない
     *  - キーボードユーザーが Tab を押せば、本物の :focus-visible が発火し
     *    YESボタン側にリングが現れる(キーボード操作時のみ) */
    if (document.activeElement && typeof document.activeElement.blur === 'function') {
      document.activeElement.blur();
    }
    setTimeout(function () {
      questionEl.focus({ preventScroll: true });
    }, 50);
  }

  function answerQuestion(isYes) {
    if (state.transitioning) return;
    const idx = state.currentQ;
    state.answers[idx] = !!isYes;

    trackEvent('shindan_q_answered', {
      question_no: idx + 1,
      answer: isYes ? 'yes' : 'no'
    });

    state.transitioning = true;
    // フェード演出: 質問テキストを一瞬透明に
    const card = $modalOverlay.querySelector('.cwa-card');
    card.style.opacity = '0.4';
    card.style.transition = 'opacity 0.25s ease';

    setTimeout(function () {
      card.style.opacity = '';
      card.style.transition = '';
      if (idx + 1 < CONFIG.QUESTIONS.length) {
        state.currentQ = idx + 1;
        renderQuestion();
      } else {
        finishDiagnosis();
      }
      state.transitioning = false;
    }, CONFIG.QUESTION_TRANSITION_MS);
  }

  function goBack() {
    if (state.transitioning) return;
    if (state.currentQ === 0) return;
    trackEvent('shindan_back', { from_question_no: state.currentQ + 1 });
    state.currentQ = state.currentQ - 1;
    state.answers.pop();
    renderQuestion();
  }

  function abandonDiagnosis() {
    trackEvent('shindan_abandoned', { last_question_no: state.currentQ + 1 });
    $modalOverlay.hidden = true;
    unlockBodyScroll();
    releaseTrap();
  }

  $btnYes.addEventListener('click', function () { answerQuestion(true); });
  $btnNo.addEventListener('click',  function () { answerQuestion(false); });
  $backBtn.addEventListener('click', goBack);
  $modalClose.addEventListener('click', abandonDiagnosis);

  /* ============================================================
   * Loading screen (5s)
   * ============================================================ */
  function finishDiagnosis() {
    // モーダルを閉じてローディングへ
    $modalOverlay.hidden = true;
    releaseTrap();
    // bodyスクロールはloading->resultでも維持したいので
    // unlock → lock を毎回挟まずに、loadingOverlay表示時に再trap
    showLoading(function () {
      const jobId = decideResult(state.answers);
      showResult(jobId);
    });
  }

  function showLoading(onDone) {
    $loadingOverlay.hidden = false;
    trapFocus($loadingOverlay);
    renderIcons();

    const start = performance.now();
    const duration = CONFIG.LOADING_DURATION_MS;

    // プログレスバー (CSS transitionで線形)
    $loadingFill.style.transition = 'none';
    $loadingFill.style.width = '0%';
    // reflow
    void $loadingFill.offsetWidth;
    $loadingFill.style.transition = 'width ' + duration + 'ms linear';
    $loadingFill.style.width = '100%';

    // メッセージ切替
    let msgIdx = -1;
    const tickHandle = setInterval(function () {
      const elapsed = performance.now() - start;
      const next = CONFIG.LOADING_MESSAGES.findIndex(function (m) {
        return elapsed < m.until;
      });
      const useIdx = next === -1 ? CONFIG.LOADING_MESSAGES.length - 1 : next;
      if (useIdx !== msgIdx) {
        msgIdx = useIdx;
        $loadingMsg.style.opacity = '0';
        setTimeout(function () {
          $loadingMsg.textContent = CONFIG.LOADING_MESSAGES[useIdx].text;
          $loadingMsg.style.opacity = '1';
        }, 150);
      }
    }, 100);

    setTimeout(function () {
      clearInterval(tickHandle);
      $loadingOverlay.hidden = true;
      releaseTrap();
      onDone();
    }, duration);
  }

  /* ============================================================
   * Result screen
   * ============================================================ */
  function showResult(jobId) {
    const job = CONFIG.JOBS[jobId];
    if (!job) {
      console.error('Unknown job id:', jobId);
      return;
    }

    // アイコン: Lucide属性を差し替えてre-render
    $resultIcon.setAttribute('data-lucide', job.icon);
    // 既にSVG展開されている場合に備え、placeholder <i>に戻す
    if ($resultIcon.tagName.toLowerCase() === 'svg') {
      const fresh = document.createElement('i');
      fresh.id = 'cwa-result-icon';
      fresh.setAttribute('data-lucide', job.icon);
      $resultIcon.parentNode.replaceChild(fresh, $resultIcon);
    }

    $resultCta.href = job.url;
    $resultCta.dataset.resultJob = job.label;

    $resultOverlay.hidden = false;
    trapFocus($resultOverlay);
    renderIcons();

    // 完了フラグ保存
    lsSet(CONFIG.LS_KEY_COMPLETED, 'true');

    trackEvent('shindan_completed', { result_job: job.label });

    setTimeout(function () { $resultCta.focus(); }, 50);
  }

  function closeResult() {
    $resultOverlay.hidden = true;
    unlockBodyScroll();
    releaseTrap();
  }

  $resultClose.addEventListener('click', closeResult);

  $resultCta.addEventListener('click', function () {
    const jobLabel = $resultCta.dataset.resultJob || '';
    trackEvent('shindan_line_clicked', { result_job: jobLabel });
    // target=_blank なのでクリック直後にタブが開く。
    // 同タブのオーバーレイは残しておく(ユーザーが戻った時に再アクセス可能)
  });

  /* ============================================================
   * Init
   * ============================================================ */
  function init() {
    renderIcons();
    if (!shouldShowBanner()) return;
    setTimeout(showBanner, CONFIG.BANNER_DELAY_MS);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
